const MAIN_TABS = ["💰 가계부","🧭 루틴","🍎 식단","📊 통계"];

const DETAIL_TABS = ["💰 가계부","🧭 루틴","🍎 식단"];

const DAYS = ["일","월","화","수","목","금","토"];

const ROUTINE_KEYS= ["오전","라인관리","산책","소비통제","밤"];

const ROUTINE_EMOJI=["☀️","📏","🚶","💳","🌙"];

const CAT_EMOJI = ["🏠","🛒","🍽️","🛍️","📚","💡"];



const p2 = n => String(n).padStart(2,"0");



const todayInfo = () => {

const d = new Date();

return {

iso: d.toISOString().slice(0,10),

label: `${d.getFullYear()}.${p2(d.getMonth()+1)}.${p2(d.getDate())} ${DAYS[d.getDay()]}요일`,

};

};



const isoToLabel = iso => {

const d = new Date(iso+"T00:00:00");

return `${iso} (${DAYS[d.getDay()]}요일)`;

};



// week Mon–Sun

const getWeekDates = iso => {

const d = new Date(iso+"T00:00:00");

const dow = d.getDay();

const mon = new Date(d);

mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));

return Array.from({length:7}, (_,i) => {

const dd = new Date(mon); dd.setDate(mon.getDate()+i);

return dd.toISOString().slice(0,10);

});

};



const getPrevWeekDates = iso => {

const d = new Date(iso+"T00:00:00"); d.setDate(d.getDate()-7);

return getWeekDates(d.toISOString().slice(0,10));

};



const getMonthDates = iso => {

const d = new Date(iso+"T00:00:00");

const y = d.getFullYear(), m = d.getMonth();

const days = new Date(y,m+1,0).getDate();

return Array.from({length:days}, (_,i) => `${y}-${p2(m+1)}-${p2(i+1)}`);

};



// defaults

const defLedger = () => ({ 수입:"", 필수:"", 생활:"", 식비:"", 쇼핑:"", 자기개발:"", 기타:"", 저축투자:"", note:"" });

const defRoutine = () => ({ 오전:false,오전상세:"",라인관리:false,산책:false,산책상세:"",단백질:"",소비통제:false,디지털:"해당없음",밤:false,밤상세:"",note:"" });

const defDiet = () => ({ 아침메뉴:"",아침포만감:"",점심메뉴:"",점심포만감:"",간식:"",저녁메뉴:"",저녁포만감:"",산책:false,note:"",몸무게:"" });



const lsGet = (key,iso,fn) => { try{ const r=localStorage.getItem(`dt_${key}_${iso}`); return r?JSON.parse(r):fn(); }catch{return fn();} };



function useStorage(key, iso, fn) {

const [data, setData] = useState(() => lsGet(key,iso,fn));

const save = useCallback(v => {

setData(v);

try { localStorage.setItem(`dt_${key}_${iso}`, JSON.stringify(v)); } catch {}

}, [key,iso]);

return [data,save];

}



function getHistoryDates(todayIso) {

return [...new Set(

Object.keys(localStorage).filter(k=>k.startsWith("dt_"))

.map(k=>k.split("_")[2]).filter(Boolean)

)].filter(d => d <= (todayIso || new Date().toISOString().slice(0,10))).sort().reverse().slice(0,90);

}

const S = {

</div>

const SectionLabel = ({ t, children, noMargin }) => (

);



const CheckBtn = ({ t, checked, onClick, disabled }) => (

<button onClick={onClick} disabled={disabled}

style={{ width:34, height:34, borderRadius:"50%", border:`2.5px solid ${checked?t.accent:"#ddd"}`, background:checked?t.accent:"#fff", cursor:disabled?"default":"pointer", fontSize:16, color:checked?t.accentTxt:"#ccc", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.18s", fontWeight:800 }}>

{checked?"✓":"○"}

</button>

);



function CopyBtn({ t, text, label="📋 텍스트 복사" }) {

const [done, setDone] = useState(false);

const copy = () => {

navigator.clipboard.writeText(text).catch(()=>{});

setDone(true);

setTimeout(()=>setDone(false), 1800);

};

return (

<button onClick={copy}

style={{ background: done ? "#3d9e7b" : t.accent, color:"#fff", border:"none", borderRadius:16, padding:"14px", ...S.h3, cursor:"pointer", fontFamily:"inherit", fontWeight:700, boxShadow:`0 4px 14px ${t.accent}44`, transition:"background 0.2s", marginBottom:8 }}>

{done ? "✓ 복사됐어요!" : label}

</button>

);

}



const BarRow = ({ label, value, max, color, right }) => {

const pct = max > 0 ? Math.min((value/max)*100, 100) : 0;

return (

<div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>

<div style={{ height:8, background:"#f0f0f0", borderRadius:99, overflow:"hidden" }}>

<div style={{ height:"100%", width:`${pct}%`, background:color, borderRadius:99, transition:"width 0.5s ease" }}/>

</div>

</div>

);

};



// vertical mini bar

const MiniBar = ({ value, max, color, label, sub, isToday }) => {

{sub && <span style={{ fontSize:9, color:"#aaa", textAlign:"center", lineHeight:1.2 }}>{sub}</span>}

// ─── Ledger ───────────────────────────────────────────────────────────────────

function LedgerTab({ data, onChange, t, readOnly, iso }) {

const set = (k,v) => { if (!readOnly) onChange({...data,[k]:v}); };

const spendTotal = SPEND_CATS.reduce((s,k) => s+(parseInt(data[k])||0), 0);

const income = parseInt(data.수입)||0;

const balance = income - spendTotal;

const savings = parseInt(data.저축투자)||0;



const copyText = [

`💰 가계부 [${iso||"오늘"}]`,

``,

`수입: ${income.toLocaleString()}원`,

...SPEND_CATS.map((k,i)=>`${CAT_EMOJI[i]}${k}: ${(parseInt(data[k])||0).toLocaleString()}원`),

`💎 저축/투자: ${savings.toLocaleString()}원`,

``,

`총 지출: ${spendTotal.toLocaleString()}원`,

`잔액: ${balance.toLocaleString()}원 ${balance>=0?"👍":"⚠️"}`,

data.note ? `\n💬 ${data.note}` : "",

].filter(l=>l!==undefined).join("\n");



const [focusedKey, setFocusedKey] = useState(null);



const numInput = (k, wide) => {

const raw = data[k] || "";

const num = parseInt(raw) || 0;

const isFocused = focusedKey === k;

return (

<div style={{ display:"flex", alignItems:"center", gap:4 }}>

<input

type={isFocused ? "number" : "text"}

placeholder="0"

value={isFocused ? raw : (num > 0 ? num.toLocaleString() : "")}

readOnly={readOnly}

onFocus={() => setFocusedKey(k)}

onBlur={() => setFocusedKey(null)}

onChange={e => set(k, e.target.value)}

style={{ width:wide||118, textAlign:"right", border:"none", borderRadius:10, padding:"7px 11px", ...S.body, background:readOnly?"#f5f5f5":t.inputBg, outline:"none", fontFamily:"inherit", color:"#222" }}

/>

<span style={{ ...S.small, color:"#aaa" }}>원</span>

</div>

);

};



return (

<div style={{ padding:16, display:"flex", flexDirection:"column", gap:14, flex:1, background:t.contentBg }}>



{/* 수입 */}

<Card t={t}>

<SectionLabel t={t}>💵 수입</SectionLabel>

<div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>

<span style={{ ...S.h3, color:"#333" }}>이번 달 수입</span>

{numInput("수입", 130)}

</div>

</Card>



{/* 지출 */}

<Card t={t}>

<SectionLabel t={t}>💸 지출 항목</SectionLabel>

{SPEND_CATS.map((k,i) => (

<div key={k} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 0", borderBottom: i<SPEND_CATS.length-1 ? `1px solid ${t.rowBorder}` : "none" }}>

<span style={{ ...S.body, color:"#444" }}>{CAT_EMOJI[i]} {k}</span>

{numInput(k)}

</div>

))}

</Card>



{/* 저축/투자 */}

<Card t={t}>

<SectionLabel t={t}>💎 저축 / 투자</SectionLabel>

<div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>

<span style={{ ...S.body, color:"#444" }}>💰 저축/투자</span>

{numInput("저축투자")}

</div>

</Card>



{/* 요약 카드 */}

<div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>

{[

{ label:"총 지출", value:spendTotal, color:t.accent },

{ label:"저축/투자", value:savings, color:"#3d9e7b" },

{ label:"수입", value:income, color:"#5b6af7" },

{ label:"잔액", value:balance, color: balance>=0 ? "#3d9e7b" : "#f0735a" },

].map(({label,value,color}) => (

<div key={label} style={{ background:t.cardBg, borderRadius:16, padding:"14px 14px", border:`1.5px solid ${t.cardBorder}`, textAlign:"center", boxShadow:t.cardShadow }}>

<div style={{ ...S.tiny, color:"#999", marginBottom:6 }}>{label}</div>

<div style={{ ...S.h2, color, letterSpacing:"-0.5px" }}>{Math.abs(value).toLocaleString()}<span style={{ fontSize:12, fontWeight:500 }}>원</span></div>

<SectionLabel t={t}>✏️ 한 줄 느낌</SectionLabel>

</Card>

<CopyBtn t={t} text={copyText} label="📋 가계부 텍스트 복사"/>

<div style={{height:8}}/>

// ─── Routine ──────────────────────────────────────────────────────────────────

function RoutineTab({ data, onChange, t, readOnly, iso }) {

const set = (k,v) => { if (!readOnly) onChange({...data,[k]:v}); };

const items = [

{ key:"오전", label:"오전 루틴", hasDetail:true, detailKey:"오전상세" },

{ key:"라인관리", label:"라인관리", hasDetail:false },

{ key:"산책", label:"산책", hasDetail:true, detailKey:"산책상세" },

{ key:"소비통제", label:"소비통제", hasDetail:false },

{ key:"밤", label:"밤 루틴", hasDetail:true, detailKey:"밤상세" },

];

const done = items.filter(i=>data[i.key]).length;



const copyText = [

`🧭 루틴관리 [${iso||"오늘"}]`,

``,

`달성: ${done}/${items.length}`,

...items.map(({key,label,hasDetail,detailKey})=>{

const check = data[key] ? "✅" : "⬜";

const memo = hasDetail && data[detailKey] ? ` (${data[detailKey]})` : "";

return `${check} ${label}${memo}`;

}),

`🥩 단백질: ${data.단백질||"미입력"}`,

`📱 디지털: ${data.디지털}`,

data.note ? `\n💬 ${data.note}` : "",

].filter(l=>l!==undefined).join("\n");



return (

<div style={{ padding:16, display:"flex", flexDirection:"column", gap:14, flex:1, background:t.contentBg }}>

{/* progress */}

<Card t={t}>

<div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>

<SectionLabel t={t} noMargin>📊 오늘 달성률</SectionLabel>

<span style={{ ...S.h2, color:t.accent }}>{done}<span style={{ ...S.small, color:"#aaa" }}>/{items.length}</span></span>

</div>

<div style={{ height:10, background:t.accentLight, borderRadius:99, overflow:"hidden" }}>

<div style={{ height:"100%", width:`${(done/items.length)*100}%`, background:t.accent, borderRadius:99, transition:"width 0.4s ease" }}/>

</div>

</Card>



{/* 체크리스트 */}

<Card t={t}>

<SectionLabel t={t}>✅ 루틴 체크</SectionLabel>

{items.map(({key,label,hasDetail,detailKey},idx) => (

<div key={key} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0", borderBottom:idx<items.length-1?`1px solid ${t.rowBorder}`:"none" }}>

<CheckBtn t={t} checked={data[key]} onClick={()=>set(key,!data[key])} disabled={readOnly}/>

<span style={{ ...S.body, flex:1, color:data[key]?"#222":"#888", fontWeight:data[key]?700:400 }}>

{ROUTINE_EMOJI[ROUTINE_KEYS.indexOf(key)]} {label}

</span>

{hasDetail && (

<input placeholder="메모" value={data[detailKey]||""} onChange={e=>set(detailKey,e.target.value)} readOnly={readOnly}

style={{ border:"none", borderRadius:10, padding:"6px 10px", ...S.small, width:96, textAlign:"right", outline:"none", background:readOnly?"#f5f5f5":t.inputBg, fontFamily:"inherit", color:"#555" }}/>

)}

</div>

))}

</Card>



<Card t={t}>

<SectionLabel t={t}>🥩 단백질</SectionLabel>

<input placeholder="오늘 먹은 단백질 식품" value={data.단백질} onChange={e=>set("단백질",e.target.value)} readOnly={readOnly}

style={{ width:"100%", border:"none", borderRadius:10, padding:"10px 12px", ...S.body, background:readOnly?"#f5f5f5":t.inputBg, outline:"none", fontFamily:"inherit", color:"#333" }}/>

</Card>



<Card t={t}>

<SectionLabel t={t}>📱 디지털 디톡스 (화/금)</SectionLabel>

<div style={{ display:"flex", gap:8 }}>

{["해당없음","O","X"].map(v => (

<button key={v} onClick={()=>set("디지털",v)} disabled={readOnly}

style={{ padding:"8px 18px", borderRadius:20, border:`2px solid ${data.디지털===v?t.accent:"#e0e0e0"}`, background:data.디지털===v?t.accent:"#fff", ...S.small, cursor:readOnly?"default":"pointer", fontFamily:"inherit", color:data.디지털===v?t.accentTxt:"#888", fontWeight:data.디지털===v?700:500, transition:"all 0.18s" }}>

{v}

</button>

))}

</div>

</Card>



<Card t={t}>

<SectionLabel t={t}>✏️ 한 줄 느낌</SectionLabel>

<textarea placeholder="오늘 루틴 느낌을 한 줄로" value={data.note} onChange={e=>set("note",e.target.value)} readOnly={readOnly}

style={{ width:"100%", border:"none", borderRadius:12, padding:"10px 12px", ...S.body, background:readOnly?"#f5f5f5":t.inputBg, outline:"none", resize:"none", minHeight:64, fontFamily:"inherit", color:"#333", lineHeight:1.7 }}/>

</Card>

<CopyBtn t={t} text={copyText} label="📋 루틴 텍스트 복사"/>

<div style={{height:8}}/>

</div>

);

}



// ─── Diet ─────────────────────────────────────────────────────────────────────

function DietTab({ data, onChange, t, readOnly, iso }) {

const set = (k,v) => { if (!readOnly) onChange({...data,[k]:v}); };



// 오늘이 월요일인지 확인

const isMonday = useMemo(() => {

const d = new Date((iso||new Date().toISOString().slice(0,10))+"T00:00:00");

return d.getDay() === 1;

}, [iso]);



// 최근 8주 월요일 몸무게 기록 수집

const weightHistory = useMemo(() => {

const results = [];

const ref = new Date((iso||new Date().toISOString().slice(0,10))+"T00:00:00");

// 이번 주 월요일부터 8주 전까지

const dow = ref.getDay();

const [viewMonth, setViewMonth] = useState(() => parseInt(todayIso.slice(5,7)));



const prevMonth = () => {

else setViewMonth(m=>m-1);

const nextMonth = () => {

if (`${viewYear}-${p2(viewMonth)}` >= todayIso.slice(0,7)) return;

if (viewMonth === 12) { setViewYear(y=>y+1); setViewMonth(1); }

else setViewMonth(m=>m+1);

};



const daysInMonth = new Date(viewYear, viewMonth, 0).getDate();

const firstDow = new Date(viewYear, viewMonth-1, 1).getDay();



const cells = [];

for (let i=0; i<firstDow; i++) cells.push(null);

for (let d=1; d<=daysInMonth; d++) cells.push(d);



const monthStr = `${viewYear}-${p2(viewMonth)}`;



// 지출 최대값 계산용 (색 강도 기준)

const dayInfo = useMemo(() => {

const m = {};

for (let d=1; d<=daysInMonth; d++) {

const iso = `${monthStr}-${p2(d)}`;

if (iso > todayIso) continue; // 오늘 이후 제외

if (recordedSet.has(iso)) {

const r = lsGet("routine", iso, defRoutine);

const l = lsGet("ledger", iso, defLedger);

const done = ROUTINE_KEYS.filter(k=>r[k]).length;

const spend = SPEND_CATS.reduce((s,k)=>s+(parseInt(l[k])||0), 0);

m[d] = { has:true, perfect: done===ROUTINE_KEYS.length, done, spend };

}

}

return m;

}, [monthStr, daysInMonth, recordedSet, todayIso]);



const maxSpend = useMemo(() =>

Math.max(...Object.values(dayInfo).map(v=>v.spend||0), 1)

, [dayInfo]);



// 지출 → 연두~빨강 색상 (0=없음 연두, 1.0=최대 빨강)

const spendColor = (spend) => {

if (!spend) return null;

const ratio = Math.min(spend / maxSpend, 1);

// 연두 #86efac → 주황 #fb923c → 빨강 #f0735a

if (ratio < 0.5) {

const r = Math.round(134 + (251-134)*ratio*2);

const g = Math.round(239 + (146-239)*ratio*2);

const b = Math.round(172 + (60-172)*ratio*2);

return `rgb(${r},${g},${b})`;

} else {

const r2 = (ratio-0.5)*2;

const r = Math.round(251 + (240-251)*r2);

const g = Math.round(146 + (115-146)*r2);

const b = Math.round(60 + (90-60)*r2);

return `rgb(${r},${g},${b})`;

}

};



const isToday = d => `${monthStr}-${p2(d)}` === todayIso;

const isFuture = d => `${monthStr}-${p2(d)}` > todayIso;



return (

<div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", display:"flex", alignItems:"flex-end", zIndex:100 }}>

<div onClick={e=>e.stopPropagation()}

style={{ background:"#fff", borderRadius:"24px 24px 0 0", width:"100%", maxHeight:"80vh", overflow:"hidden", display:"flex", flexDirection:"column", boxShadow:"0 -4px 30px rgba(0,0,0,0.18)" }}>



{/* header */}

<div style={{ padding:"20px 20px 14px", borderBottom:`1.5px solid ${t.cardBorder}` }}>

<div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>

<span style={{ ...S.h2, color:t.labelColor }}>📅 기록 달력</span>

<button onClick={onClose} style={{ background:t.inputBg, border:"none", width:32, height:32, borderRadius:"50%", cursor:"pointer", ...S.body, color:"#666", fontWeight:700 }}>✕</button>

</div>



{/* month nav */}

<div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>

<button onClick={prevMonth}

style={{ width:36, height:36, borderRadius:"50%", border:`1.5px solid ${t.cardBorder}`, background:"#fff", cursor:"pointer", fontSize:16, color:t.labelColor, fontWeight:700 }}>‹</button>

<span style={{ ...S.h3, color:"#333" }}>{viewYear}년 {viewMonth}월</span>

<button onClick={nextMonth}

style={{ width:36, height:36, borderRadius:"50%", border:`1.5px solid ${t.cardBorder}`, background:"#fff", cursor:"pointer", fontSize:16, color:t.labelColor, fontWeight:700, opacity: `${viewYear}-${p2(viewMonth)}` >= todayIso.slice(0,7) ? 0.25 : 1 }}>›</button>

</div>



{/* week header */}

<div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginTop:14, textAlign:"center" }}>

{["일","월","화","수","목","금","토"].map((d,i) => (

<div key={d} style={{ ...S.tiny, fontSize:10, color: i===0?"#f0735a": i===6?"#5b6af7":"#aaa", paddingBottom:6 }}>{d}</div>

))}

</div>

</div>



{/* calendar grid */}

<div style={{ overflowY:"auto", padding:"12px 16px 40px" }}>

<div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"6px 4px" }}>

{cells.map((d, idx) => {

if (!d) return <div key={`e${idx}`}/>;

const info = dayInfo[d];

const today = isToday(d);

const future = isFuture(d);

const dow = (firstDow + d - 1) % 7;

const iso = `${monthStr}-${p2(d)}`;

const sColor = info?.spend ? spendColor(info.spend) : null;



return (

<button key={d}

onClick={() => { if (info && !future) { onSelect(iso); onClose(); } }}

style={{

display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-start",

padding:"6px 2px 5px", borderRadius:12, border:"none",

cursor: info&&!future ? "pointer" : "default",

background: today ? t.accent : "transparent",

transition:"all 0.15s",

opacity: future ? 0.2 : 1,

minHeight:54, position:"relative", overflow:"hidden",

}}>



{/* 지출 색상 배경바 (아래에서 올라오는 형태) */}

{sColor && !today && (

<div style={{

position:"absolute", bottom:0, left:0, right:0,

height:`${Math.max(20, (info.spend/maxSpend)*100)}%`,

background: sColor, opacity:0.18, borderRadius:12,

}}/>

)}



<span style={{

fontSize:13, fontWeight: today||info ? 700 : 400,

color: today ? "#fff" : dow===0 ? "#f0735a" : dow===6 ? "#5b6af7" : info ? "#222" : "#ddd",

lineHeight:1, position:"relative",

}}>{d}</span>



{/* 루틴 도트 */}

<div style={{ display:"flex", gap:2, marginTop:3, alignItems:"center", position:"relative" }}>

{info?.perfect ? (

<span style={{ fontSize:9 }}>🔥</span>

) : info?.has ? (

<div style={{ width:5, height:5, borderRadius:"50%",

background: info.done===ROUTINE_KEYS.length ? t.accent : info.done>0 ? "#facc15" : "#e0e0e0" }}/>

) : null}

</div>



{/* 지출 금액 표시 */}

{info?.spend > 0 && (

<div style={{

fontSize:8, color: today?"rgba(255,255,255,0.85)": sColor||"#bbb",

fontWeight:700, marginTop:2, position:"relative", lineHeight:1,

}}>

{info.spend >= 10000 ? `${Math.round(info.spend/1000)}k` : `${info.spend}`}

</div>

)}

</button>

);

})}

</div>



{/* legend */}

<div style={{ display:"flex", gap:10, marginTop:20, padding:"14px 4px", borderTop:`1px solid ${t.cardBorder}`, flexWrap:"wrap" }}>

{[

{ dot: t.accent, label:"오늘", type:"circle" },

{ dot: "#facc15", label:"🔥 퍼펙트 루틴", type:"emoji" },

{ dot: "#facc15", label:"루틴 부분 달성", type:"circle" },

].map(({dot,label,type})=>(

<div key={label} style={{ display:"flex", alignItems:"center", gap:5 }}>

{type==="circle"

? <div style={{ width:9, height:9, borderRadius:"50%", background:dot, flexShrink:0 }}/>

: <span style={{ fontSize:10 }}>🔥</span>}

<span style={{ ...S.tiny, fontSize:10, color:"#888" }}>{label}</span>

</div>

))}

{/* 지출 그라데이션 범례 */}

<div style={{ display:"flex", alignItems:"center", gap:6, width:"100%", marginTop:4 }}>

<span style={{ ...S.tiny, fontSize:10, color:"#888", whiteSpace:"nowrap" }}>지출 →</span>

<div style={{ flex:1, height:8, borderRadius:99, background:"linear-gradient(to right, #86efac, #fb923c, #f0735a)" }}/>

<span style={{ ...S.tiny, fontSize:10, color:"#888" }}>많음</span>

</div>

</div>

</div>

</div>

</div>

);

}



// ─── App ──────────────────────────────────────────────────────────────────────

export default function App() {

const { iso, label } = todayInfo();

const [tab, setTab] = useState(0);

const [historyTab,setHistoryTab]= useState(0);

const [showHist, setShowHist] = useState(false);

const [viewDate, setViewDate] = useState(null);

const [saved, setSaved] = useState(false);



const themeIdx = tab === 3 ? 0 : tab;

const t = THEMES[themeIdx];



const [ledger, setLedger] = useStorage("ledger", iso, defLedger);

const [routine, setRoutine] = useStorage("routine", iso, defRoutine);

const [diet, setDiet] = useStorage("diet", iso, defDiet);



const ws = s => v => { s(v); setSaved(true); setTimeout(()=>setSaved(false),1400); };



if (viewDate) return (

<><style>{CSS}</style>

<HistoryDetail iso={viewDate} onBack={()=>setViewDate(null)} tab={historyTab} setTab={setHistoryTab}/></>

);



return (

<><style>{CSS}</style>

<div style={{ maxWidth:420, margin:"0 auto", minHeight:"100vh", display:"flex", flexDirection:"column", background:t.contentBg, transition:"background 0.3s" }}>



{/* Header */}

<div style={{ background:t.headerBg, padding:"20px 20px 0", position:"sticky", top:0, zIndex:10, transition:"background 0.3s" }}>

<div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>

<div>

<div style={{ ...S.h1, color:t.titleColor, fontFamily:"'Gowun Dodum',serif" }}>나의 하루 기록 ✦</div>

<div style={{ ...S.small, color:t.dateColor, marginTop:2 }}>{label}</div>

</div>

<div style={{ display:"flex", gap:8, alignItems:"center", paddingTop:4 }}>

<span style={{ ...S.tiny, color:t.saveTxt, opacity:saved?1:0, transition:"opacity 0.3s" }}>✓ 저장됨</span>

<button onClick={()=>setShowHist(true)}

style={{ border:`1.5px solid ${t.histBorder}`, color:t.histTxt, padding:"6px 13px", borderRadius:20, ...S.tiny, cursor:"pointer", background:"rgba(255,255,255,0.15)", fontFamily:"inherit" }}>

📅 기록

</button>

</div>

</div>



{/* Tab bar */}

<div style={{ display:"flex", gap:4, marginTop:14, paddingBottom:0 }}>

{MAIN_TABS.map((name,i) => (

<button key={name} onClick={()=>setTab(i)}

style={{ flex:1, padding:"9px 2px", border:"none", fontFamily:"inherit", fontSize:10, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", borderRadius:"12px 12px 0 0", transition:"all 0.22s",

background: tab===i ? t.tabActiveBg : "rgba(255,255,255,0.12)",

color: tab===i ? t.tabActiveTxt : t.tabInactive,

}}>

{name}

</button>

))}

</div>

</div>



{tab===0 && <LedgerTab data={ledger} onChange={ws(setLedger)} t={t} iso={iso}/>}

{tab===1 && <RoutineTab data={routine} onChange={ws(setRoutine)} t={t} iso={iso}/>}

{tab===2 && <DietTab data={diet} onChange={ws(setDiet)} t={t} iso={iso}/>}

{tab===3 && <StatsView todayIso={iso}/>}



{showHist && <CalendarModal t={t} todayIso={iso} onClose={()=>setShowHist(false)} onSelect={d=>{setViewDate(d);setHistoryTab(Math.min(tab,2));}}/>}

</div></>

);

}



const CSS = `

@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Pretendard:wght@400;500;600;700;800;900&display=swap');

@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body { font-family:'Pretendard','Noto Sans KR',sans-serif; background:#e8e8e8; -webkit-font-smoothing:antialiased; }

input[type=number]::-webkit-inner-spin-button,

input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }

textarea, input, button { font-family:inherit; }

::-webkit-scrollbar { width:0; }

`;





const root = ReactDOM.createRoot(document.getElementById('root'));

root.render(React.createElement(App));

</script>

</body>

</html>
