const p2 = n => String(n).padStart(2,"0");
const getLocalDateStr = (d = new Date()) => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const isoToLabel = iso => { const d = new Date(iso+"T00:00:00"); return `${iso} (${DAYS[d.getDay()]}요일)`; };

const getWeekDates = iso => {
  const d = new Date(iso+"T00:00:00"), dow = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate()-(dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{ const dd=new Date(mon); dd.setDate(mon.getDate()+i); return getLocalDateStr(dd); });
};
const getPrevWeekDates = iso => { const d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()-7); return getWeekDates(getLocalDateStr(d)); };
const getMonthDates = iso => { const d=new Date(iso+"T00:00:00"),y=d.getFullYear(),m=d.getMonth(),days=new Date(y,m+1,0).getDate(); return Array.from({length:days},(_,i)=>`${y}-${p2(m+1)}-${p2(i+1)}`); };

const lsGet = (key,iso,fn) => { try{ const r=localStorage.getItem(`dt_${key}_${iso}`); return r?JSON.parse(r):fn(); }catch{return fn();} };
const lsSave = (key,iso,v) => { try{ localStorage.setItem(`dt_${key}_${iso}`,JSON.stringify(v)); }catch{} };

function useStorage(key, iso, fn) {
  const [data, setData] = useState(() => lsGet(key,iso,fn));
  useEffect(() => { setData(lsGet(key,iso,fn)); }, [iso]);
  const save = useCallback(v => {
    setData(v);
    const s = JSON.stringify(v);
    try{ localStorage.setItem(`dt_${key}_${iso}`,s); }catch{}
    setTimeout(()=>{ try{ localStorage.setItem(`dt_${key}_${iso}`,s); }catch{} },50);
  },[key,iso]);
  return [data,save];
}

// 날짜가 오늘 이하면 모두 접근 허용 (미래만 제외)
function getHistoryDates(todayIso) {
  const today = todayIso || getLocalDateStr();
  return [...new Set(
    Object.keys(localStorage).filter(k=>k.startsWith("dt_"))
      .map(k=>{ const p=k.split("_"); return p[2]; }).filter(Boolean)
  )].filter(d => d <= today).sort().reverse().slice(0,180);
}

// ── 건별 거래 입력 모달 ──────────────────────────────────────────────────────

  const handleSave=()=>{
    if(!form.amount||parseInt(form.amount)<=0){alert("금액을 입력하세요");return;}
    onSave({...form,id:editTxn?.id||Date.now(),amount:parseInt(form.amount)||0});
    onClose();
  };

  const inp=(k,ph,type="text",extra={})=>(
    <input type={type} placeholder={ph} value={form[k]} onChange={e=>set(k,e.target.value)}
      style={{width:"100%",border:"none",borderRadius:10,padding:"10px 12px",...S.body,background:t.inputBg,outline:"none",fontFamily:"inherit",color:"#222",...extra}}/>
  );

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"24px 24px 0 0",width:"100%",maxHeight:"90vh",overflowY:"auto",padding:"24px 20px 40px",boxShadow:"0 -4px 30px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{...S.h2,color:"#222"}}>{editTxn?"✏️ 거래 수정":"➕ 거래 추가"}</span>
          <button onClick={onClose} style={{background:"#f5f5f5",border:"none",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16,color:"#666",fontWeight:700}}>✕</button>
        </div>

        {/* 수입/지출 */}
        <div style={{marginBottom:14}}>
          <p style={{...S.tiny,color:t.labelColor,marginBottom:8}}>수입 / 지출</p>
          <div style={{display:"flex",gap:8}}>
            {["지출","수입"].map(v=>(
              <button key={v} onClick={()=>set("type",v)}
                style={{flex:1,padding:"10px",borderRadius:12,border:`2px solid ${form.type===v?t.accent:"#e0e0e0"}`,background:form.type===v?t.accent:"#fff",color:form.type===v?"#fff":"#888",...S.small,cursor:"pointer",fontFamily:"inherit",fontWeight:700,transition:"all 0.15s"}}>
                {v==="지출"?"💸 지출":"💵 수입"}

        {/* 금액 */}
        <div style={{marginBottom:14}}>

          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {inp("amount","0","number",{fontSize:20,fontWeight:800,color:t.accent,textAlign:"right"})}
            <span style={{...S.h3,color:"#aaa",flexShrink:0}}>원</span>
          </div>
        </div>

        {/* 카테고리 */}
        <div style={{marginBottom:14}}>
          <p style={{...S.tiny,color:t.labelColor,marginBottom:8}}>카테고리</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {SPEND_CATS.map((c,i)=>(
              <button key={c} onClick={()=>set("cat",c)}
                style={{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${form.cat===c?t.accent:"#e0e0e0"}`,background:form.cat===c?t.accentLight:"#fff",color:form.cat===c?t.accent:"#888",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>

              const col=TAG_COLOR[tag];

// ── Ledger Tab ────────────────────────────────────────────────────────────────
function LedgerTab({data, onChange, t, readOnly, iso, onSaveHistory}) {
  const set=(k,v)=>{ if(!readOnly) onChange({...data,[k]:v}); };
  const [ledgerMode, setLedgerMode] = useState("summary"); // "summary" | "txn"
  const [showTxnModal, setShowTxnModal] = useState(false);
  const [editTxn, setEditTxn] = useState(null);
  const [focusedKey, setFocusedKey] = useState(null);

  const txns = data.txns || [];

  // 건별 거래에서 카테고리별 합산 → 하루합산 섹션에 반영
  const txnSpendBycat = useMemo(()=>{
    const m={};
    txns.filter(tx=>tx.type==="지출").forEach(tx=>{ m[tx.cat]=(m[tx.cat]||0)+tx.amount; });
    return m;
  },[txns]);
  const txnIncome = useMemo(()=>txns.filter(tx=>tx.type==="수입").reduce((s,tx)=>s+tx.amount,0),[txns]);

  const spendTotal = SPEND_CATS.reduce((s,k)=>s+(parseInt(data[k])||0)+( txnSpendBycat[k]||0),0);
  const fixedIncome = parseInt(data.고정수입)||0;
  const otherIncome = parseInt(data.기타소득)||0;
  const income = fixedIncome + otherIncome + txnIncome;
  const balance = income - spendTotal;
  const savings = parseInt(data.저축투자)||0;

  const addTxn = (txn) => {
    const updated = [...txns, txn];
    onChange({...data, txns: updated});
  };
  const updateTxn = (txn) => {
    const updated = txns.map(tx=>tx.id===txn.id?txn:tx);
    onChange({...data, txns: updated});
  };
  const deleteTxn = (id) => {
    if(!window.confirm("삭제할까요?")) return;
    onChange({...data, txns: txns.filter(tx=>tx.id!==id)});
  };

  const numInput = (k, wide) => {
    const raw = data[k]||"", num=parseInt(raw)||0, isFocused=focusedKey===k;
    return <div style={{display:"flex",alignItems:"center",gap:4}}>
      <input type={isFocused?"number":"text"} placeholder="0"
        value={isFocused?raw:(num>0?num.toLocaleString():"")}
        readOnly={readOnly}
        onFocus={()=>setFocusedKey(k)} onBlur={()=>setFocusedKey(null)}
        onChange={e=>set(k,e.target.value)}
        style={{width:wide||110,textAlign:"right",border:"none",borderRadius:10,padding:"7px 10px",...S.body,background:readOnly?"#f5f5f5":t.inputBg,outline:"none",fontFamily:"inherit",color:"#222"}}/>
      <span style={{...S.small,color:"#aaa"}}>원</span>
    </div>;
  };

  const copyText = [
    `💰 가계부 [${iso||"오늘"}]`,``,
    `💵 고정수입: ${fixedIncome.toLocaleString()}원`,
    `💸 기타소득: ${otherIncome.toLocaleString()}원`,
    txnIncome>0?`🔖 건별수입: ${txnIncome.toLocaleString()}원`:"",
    `합계: ${income.toLocaleString()}원`,``,
    ...SPEND_CATS.map((k,i)=>{
      const sum=(parseInt(data[k])||0)+(txnSpendBycat[k]||0);
      return sum>0?`${CAT_EMOJI[i]}${k}: ${sum.toLocaleString()}원`:"";
    }).filter(Boolean),
    `💎 저축/투자: ${savings.toLocaleString()}원`,``,
    `총 지출: ${spendTotal.toLocaleString()}원`,
    `잔액: ${balance.toLocaleString()}원 ${balance>=0?"👍":"⚠️"}`,
    data.note?`\n💬 ${data.note}`:"",
    txns.length>0?`\n── 건별 거래 ──`:"",
    ...txns.map(tx=>`${tx.type==="지출"?"💸":"💵"} ${tx.amount.toLocaleString()}원 [${tx.cat}] ${tx.content||""}${tx.tag?` #${tx.tag}`:""}${tx.memo?` (${tx.memo})`:""}`),
  ].filter(l=>l!==undefined&&l!=="").join("\n");

  return (
    <div style={{padding:16,display:"flex",flexDirection:"column",gap:14,flex:1,background:t.contentBg}}>

      {/* 저장 버튼 (지난 기록 수정 시) */}
      {readOnly===false&&onSaveHistory&&(
        <button onClick={onSaveHistory} style={{background:t.accent,color:"#fff",border:"none",borderRadius:16,padding:"13px",...S.h3,cursor:"pointer",fontFamily:"inherit",fontWeight:700,boxShadow:`0 4px 14px ${t.accent}44`}}>💾 수정 저장</button>
      )}

      {/* 모드 전환 탭 */}
      <div style={{display:"flex",gap:6,background:"#f0f0f0",borderRadius:14,padding:4}}>
        {[["summary","📊 하루 합산"],["txn","📋 건별 거래"]].map(([v,label])=>(
          <button key={v} onClick={()=>setLedgerMode(v)}

                  </div>}
                </div>
              </div>;
            })}
          </Card>
        )}

        {/* 태그별 소비 요약 */}
        {txns.length>0&&(()=>{
          const tagSums={};
          txns.filter(tx=>tx.tag&&tx.type==="지출").forEach(tx=>{tagSums[tx.tag]=(tagSums[tx.tag]||0)+tx.amount;});
          if(!Object.keys(tagSums).length) return null;
          return <Card t={t}>
            <SectionLabel t={t}>🏷️ 소비 성격별 합계</SectionLabel>
            {SPEND_TAGS.filter(tag=>tagSums[tag]).map(tag=>(
              <div key={tag} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${t.rowBorder}`}}>
                <span style={{fontSize:13,fontWeight:600,color:TAG_COLOR[tag]}}>{tag}</span>
                <span style={{...S.small,fontWeight:700,color:TAG_COLOR[tag]}}>{tagSums[tag].toLocaleString()}원</span>
              </div>
            ))}
          </Card>;
        })()}
      </>}

      <CopyBtn t={t} text={copyText} label="📋 가계부 텍스트 복사"/>
      <div style={{height:8}}/>

      {showTxnModal&&<TxnModal t={t} iso={iso} onClose={()=>setShowTxnModal(false)}
        onSave={txn=>{ editTxn?updateTxn(txn):addTxn(txn); }}
        editTxn={editTxn}/>}
    </div>
  );
}

// ── Diet Tab ──────────────────────────────────────────────────────────────────
function DietTab({data,onChange,t,readOnly,iso,onSaveHistory}) {
  const set=(k,v)=>{ if(!readOnly) onChange({...data,[k]:v}); };
  const isMonday=useMemo(()=>new Date((iso||getLocalDateStr())+"T00:00:00").getDay()===1,[iso]);
  const weightHistory=useMemo(()=>{
    const results=[],ref=new Date((iso||getLocalDateStr())+"T00:00:00"),dow=ref.getDay();
    const thisMonday=new Date(ref); thisMonday.setDate(ref.getDate()-(dow===0?6:dow-1));
    for(let i=7;i>=0;i--){const d=new Date(thisMonday);d.setDate(thisMonday.getDate()-i*7);const wIso=getLocalDateStr(d);const diet=lsGet("diet",wIso,defDiet);if(diet.몸무게&&parseFloat(diet.몸무게)>0)results.push({iso:wIso,w:parseFloat(diet.몸무게)});}
    return results;
  },[iso]);
  const meals=[{label:"🌅 아침",menuKey:"아침메뉴",satKey:"아침포만감"},{label:"☀️ 점심",menuKey:"점심메뉴",satKey:"점심포만감"},{label:"🌙 저녁",menuKey:"저녁메뉴",satKey:"저녁포만감"}];
  const copyText=[`🍎 식단기록 [${iso||"오늘"}]`,``,...meals.map(({label,menuKey,satKey})=>[`${label}`,data[menuKey]?`  ${data[menuKey]}`:"  (미입력)",data[satKey]?`  포만감: ${"⭐".repeat(parseInt(data[satKey]))} (${data[satKey]}/10)`:""].filter(Boolean).join("\n")),``,`🍡 간식: ${data.간식||"없음"}`,`🚶 산책: ${data.산책?"완료":"미완"}`,data.note?`\n💬 ${data.note}`:""].join("\n");
  return (
    <div style={{padding:16,display:"flex",flexDirection:"column",gap:14,flex:1,background:t.contentBg}}>
      {readOnly===false&&onSaveHistory&&<button onClick={onSaveHistory} style={{background:t.accent,color:"#fff",border:"none",borderRadius:16,padding:"13px",...S.h3,cursor:"pointer",fontFamily:"inherit",fontWeight:700,boxShadow:`0 4px 14px ${t.accent}44`}}>💾 수정 저장</button>}
      {meals.map(({label,menuKey,satKey},mi)=>{
        const stripe=t.mealStripes[mi];
        return <Card key={menuKey} t={t}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <div style={{width:5,height:22,background:stripe,borderRadius:99}}/>
            <SectionLabel t={t} noMargin>{label}</SectionLabel>
          </div>
          <textarea placeholder="메뉴를 입력하세요" value={data[menuKey]} onChange={e=>set(menuKey,e.target.value)} readOnly={readOnly}
            style={{width:"100%",border:"none",borderRadius:10,padding:"9px 12px",...S.body,background:readOnly?"#f5f5f5":t.inputBg,outline:"none",resize:"none",minHeight:48,fontFamily:"inherit",color:"#333",lineHeight:1.7}}/>
          <div style={{marginTop:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{...S.small,color:t.labelColor}}>포만감</span>
              <span style={{fontSize:13,fontWeight:800,color:data[satKey]?stripe:"#ccc"}}>{data[satKey]?`${data[satKey]} / 10`:"미입력"}</span>
            </div>
            <div style={{display:"flex",gap:2}}>
              {[...Array(10)].map((_,i)=>{
                const fv=i+1,hv=i+0.5,cur=parseFloat(data[satKey]||0),filled=cur>=fv,halfFill=!filled&&cur>=hv;
                return <div key={i} style={{flex:1,position:"relative",fontSize:18,lineHeight:1,userSelect:"none"}}>
                  <span style={{filter:"grayscale(1) opacity(0.2)"}}>⭐</span>
                  {(filled||halfFill)&&<span style={{position:"absolute",left:0,top:0,width:filled?"100%":"50%",overflow:"hidden",display:"inline-block"}}>⭐</span>}
                  <div onClick={()=>{if(!readOnly)set(satKey,cur===hv?"":String(hv));}} style={{position:"absolute",inset:0,width:"50%",cursor:readOnly?"default":"pointer"}}/>
                  <div onClick={()=>{if(!readOnly)set(satKey,cur===fv?"":String(fv));}} style={{position:"absolute",inset:0,left:"50%",width:"50%",cursor:readOnly?"default":"pointer"}}/>
                </div>;
              })}
            </div>
          </div>
        </Card>;
      })}
      <Card t={t}><SectionLabel t={t}>🍡 간식</SectionLabel>
        <input placeholder="간식 내용" value={data.간식} onChange={e=>set("간식",e.target.value)} readOnly={readOnly}
          style={{width:"100%",border:"none",borderRadius:10,padding:"10px 12px",...S.body,background:readOnly?"#f5f5f5":t.inputBg,outline:"none",fontFamily:"inherit",color:"#333"}}/>
      </Card>
      <Card t={t}><div style={{display:"flex",alignItems:"center",gap:12}}><CheckBtn t={t} checked={data.산책} onClick={()=>set("산책",!data.산책)} disabled={readOnly}/><span style={{...S.body,color:"#444",fontWeight:500}}>🚶 산책 완료</span></div></Card>

      {isMonday&&(
        <Card t={t} style={{border:`2px solid ${t.accent}`}}>
          <SectionLabel t={t}>⚖️ 월요일 공복 몸무게</SectionLabel>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="number" step="0.1" placeholder="00.0" value={data.몸무게||""} onChange={e=>set("몸무게",e.target.value)} readOnly={readOnly}
              style={{width:120,border:"none",borderRadius:10,padding:"10px 12px",fontSize:20,fontWeight:800,background:readOnly?"#f5f5f5":t.inputBg,outline:"none",fontFamily:"inherit",color:t.accent,textAlign:"center"}}/>
            <span style={{fontSize:16,fontWeight:700,color:"#aaa"}}>kg</span>
          </div>
          <div style={{...S.tiny,color:"#aaa",marginTop:8,textAlign:"center"}}>매주 월요일 오전 공복 측정 📏</div>
          {weightHistory.length>1&&(
            <div style={{marginTop:16}}>
              <div style={{...S.tiny,color:t.labelColor,marginBottom:10}}>📈 몸무게 변화 (최근 {weightHistory.length}주)</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
                {weightHistory.map(({iso:wIso,w},i)=>{
                  const mn=Math.min(...weightHistory.map(x=>x.w)),mx=Math.max(...weightHistory.map(x=>x.w)),range=mx-mn||1,pct=(w-mn)/range,barH=20+pct*44,isLast=i===weightHistory.length-1,d=new Date(wIso+"T00:00:00");
                  return <div key={wIso} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>

                    <span style={{fontSize:8,color:"#bbb"}}>{`${d.getMonth()+1}/${d.getDate()}`}</span>
                  </div>;
                })}
              </div>
              {weightHistory.length>=2&&(()=>{const diff=(weightHistory[weightHistory.length-1].w-weightHistory[0].w).toFixed(1),sign=diff>0?"+":"";return <div style={{textAlign:"center",marginTop:10,...S.small,color:diff<0?"#3d9e7b":diff>0?"#f0735a":"#aaa"}}>{weightHistory.length}주간 {sign}{diff}kg {diff<0?"😊 감소!":diff>0?"📈 증가":"➡️ 유지"}</div>;})()}
            </div>
          )}
        </Card>
      )}
      {!isMonday&&weightHistory.length>0&&(
        <Card t={t}>
          <SectionLabel t={t}>⚖️ 최근 몸무게</SectionLabel>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:70}}>
            {weightHistory.map(({iso:wIso,w},i)=>{
              const mn=Math.min(...weightHistory.map(x=>x.w)),mx=Math.max(...weightHistory.map(x=>x.w)),range=mx-mn||1,pct=(w-mn)/range,barH=16+pct*40,isLast=i===weightHistory.length-1,d=new Date(wIso+"T00:00:00");
              return <div key={wIso} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <span style={{fontSize:8,fontWeight:800,color:isLast?t.accent:"#aaa"}}>{w}</span>
                <div style={{width:"100%",height:barH,background:isLast?t.accent:t.accentLight,borderRadius:"5px 5px 0 0"}}/>
                <span style={{fontSize:8,color:"#ccc"}}>{`${d.getMonth()+1}/${d.getDate()}`}</span>
              </div>;
            })}
          </div>
        </Card>
      )}

      <Card t={t}><SectionLabel t={t}>✏️ 한 줄 느낌</SectionLabel>
        <textarea placeholder="오늘 식단 느낌을 한 줄로" value={data.note} onChange={e=>set("note",e.target.value)} readOnly={readOnly}
          style={{width:"100%",border:"none",borderRadius:12,padding:"10px 12px",...S.body,background:readOnly?"#f5f5f5":t.inputBg,outline:"none",resize:"none",minHeight:64,fontFamily:"inherit",color:"#333",lineHeight:1.7}}/>
      </Card>
      <CopyBtn t={t} text={copyText} label="📋 식단 텍스트 복사"/>
      <div style={{height:8}}/>
    </div>
  );
}

// ── Stats View ────────────────────────────────────────────────────────────────
function StatsView({todayIso}) {
  const t=STAT_THEME;
  const [period,setPeriod]=useState("week");
  const monthKey=todayIso.slice(0,7);
  const [monthlyIncome,setMonthlyIncome]=useState(()=>{try{const s=localStorage.getItem(`dt_monthlyIncome_${monthKey}`);return s!==null?s:"885070";}catch{return "885070";}});
  const saveMonthlyIncome=v=>{setMonthlyIncome(v);try{localStorage.setItem(`dt_monthlyIncome_${monthKey}`,v);}catch{}};
  const [focusedMI,setFocusedMI]=useState(false);

  const dates=useMemo(()=>period==="prevweek"?getPrevWeekDates(todayIso):period==="month"?getMonthDates(todayIso):getWeekDates(todayIso),[period,todayIso]);
  const allData=useMemo(()=>dates.map(iso=>({iso,ledger:lsGet("ledger",iso,defLedger),routine:lsGet("routine",iso,defRoutine)})),[dates]);

  // 지출 합산 (하루합산 + 건별 거래 모두)
  const spendPerDay=allData.map(({ledger})=>{
    const base=SPEND_CATS.reduce((s,k)=>s+(parseInt(ledger[k])||0),0);
    const txnSpend=(ledger.txns||[]).filter(tx=>tx.type==="지출").reduce((s,tx)=>s+tx.amount,0);
    return base+txnSpend;
  });
  const maxSpend=Math.max(...spendPerDay,1);
  const weekTotal=spendPerDay.reduce((a,b)=>a+b,0);
  const weekSavings=allData.reduce((s,{ledger})=>s+(parseInt(ledger.저축투자)||0),0);
  const weekIncome=allData.reduce((s,{ledger})=>s+(parseInt(ledger.고정수입)||0)+(parseInt(ledger.기타소득)||0)+((ledger.txns||[]).filter(tx=>tx.type==="수입").reduce((ss,tx)=>ss+tx.amount,0)),0);

  const catTotals=SPEND_CATS.map((k,i)=>({k,emoji:CAT_EMOJI[i],v:allData.reduce((s,{ledger})=>{
    const base=parseInt(ledger[k])||0;
    const txnAmt=(ledger.txns||[]).filter(tx=>tx.type==="지출"&&tx.cat===k).reduce((ss,tx)=>ss+tx.amount,0);
    return s+base+txnAmt;
  },0)}));
  const maxCat=Math.max(...catTotals.map(c=>c.v),1);
  const miNum=parseInt(monthlyIncome)||0;

  // 무지출일
  const zeroDays=spendPerDay.filter(v=>v===0).length;

  // 소비 태그 합계
  const tagTotals=useMemo(()=>{
    const m={};
    allData.forEach(({ledger})=>{(ledger.txns||[]).filter(tx=>tx.type==="지출"&&tx.tag).forEach(tx=>{m[tx.tag]=(m[tx.tag]||0)+tx.amount;});});
    return m;
  },[allData]);

  const routinePerDay=allData.map(({routine})=>({done:ROUTINE_KEYS.filter(k=>routine[k]).length,total:ROUTINE_KEYS.length}));
  const totalDone=routinePerDay.reduce((s,r)=>s+r.done,0),totalPossible=routinePerDay.reduce((s,r)=>s+r.total,0);
  const overallPct=totalPossible>0?Math.round((totalDone/totalPossible)*100):0;
  const streak=useMemo(()=>{const hist=getHistoryDates(todayIso);let c=0;for(const iso of hist){const r=lsGet("routine",iso,defRoutine);if(ROUTINE_KEYS.filter(k=>r[k]).length===ROUTINE_KEYS.length)c++;else break;}return c;},[todayIso]);
  const dayLabels=dates.map(iso=>{const d=new Date(iso+"T00:00:00");return DAYS[d.getDay()];});
  const periodLabel=period==="week"?"이번 주":period==="prevweek"?"지난 주":"이번 달";

  const copyText=()=>{
    const lines=[`📊 ${periodLabel} 통계`,`총 지출: ${weekTotal.toLocaleString()}원`,`무지출일: ${zeroDays}일`,`저축/투자: ${weekSavings.toLocaleString()}원`,...catTotals.filter(c=>c.v>0).map(c=>`  ${c.emoji}${c.k}: ${c.v.toLocaleString()}원`),Object.keys(tagTotals).length?`\n── 소비 성격별 ──`:"", ...SPEND_TAGS.filter(tag=>tagTotals[tag]).map(tag=>`  ${tag}: ${tagTotals[tag].toLocaleString()}원`)].join("\n");
    navigator.clipboard.writeText(lines).catch(()=>{});
    alert("복사됐어요!");
  };

  return (
    <div style={{padding:16,display:"flex",flexDirection:"column",gap:14,background:t.contentBg}}>
      <div style={{display:"flex",gap:8}}>
        {[["week","이번 주"],["prevweek","지난 주"],["month","이번 달"]].map(([v,label])=>(
          <button key={v} onClick={()=>setPeriod(v)}
            style={{flex:1,padding:"9px 0",borderRadius:14,border:`2px solid ${period===v?t.accent:t.cardBorder}`,background:period===v?t.accent:"#fff",...S.small,cursor:"pointer",fontFamily:"inherit",color:period===v?t.accentTxt:"#888",fontWeight:700,transition:"all 0.18s"}}>
            {label}
          </button>
        ))}
      </div>
      <div style={{textAlign:"center",...S.small,color:t.labelColor,fontWeight:700}}>{dates[0]} ~ {dates[dates.length-1]}</div>

      {/* 스트릭 */}
      <Card t={t} style={{background:"linear-gradient(135deg,#5b6af7,#818cf8)",border:"none"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{...S.tiny,color:"rgba(255,255,255,0.7)",marginBottom:4}}>🔥 완벽 달성 연속</div><div style={{...S.h1,color:"#fff"}}>{streak}일<span style={{...S.small,color:"rgba(255,255,255,0.7)",marginLeft:6}}>연속 퍼펙트!</span></div></div>
          <div style={{fontSize:44}}>{streak>=7?"🏆":streak>=3?"🔥":"✨"}</div>
        </div>
      </Card>

      {/* 월 수입 */}
      <Card t={t}>
        <SectionLabel t={t}>💵 이번 달 고정수입</SectionLabel>
        <div style={{...S.tiny,color:"#aaa",marginBottom:8}}>생계비 + 주거급여</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <input type={focusedMI?"number":"text"} placeholder="885,070"
            value={focusedMI?monthlyIncome:(miNum>0?miNum.toLocaleString():"")}
            onFocus={()=>setFocusedMI(true)} onBlur={()=>setFocusedMI(false)} onChange={e=>saveMonthlyIncome(e.target.value)}
            style={{flex:1,textAlign:"right",border:"none",borderRadius:10,padding:"10px 12px",...S.body,background:t.inputBg,outline:"none",fontFamily:"inherit",color:"#222",fontSize:16,fontWeight:700}}/>
          <span style={{...S.small,color:"#aaa"}}>원</span>
        </div>
        {miNum>0&&<div style={{marginTop:10,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{label:"월 수입",val:miNum,color:"#5b6af7"},{label:"이달 지출",val:period==="month"?weekTotal:null,color:"#f0735a"},{label:"남은 예산",val:period==="month"?miNum-weekTotal:null,color:(miNum-weekTotal)>=0?"#3d9e7b":"#f0735a"}].map(({label,val,color})=>(
            <div key={label} style={{background:t.inputBg,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
              <div style={{...S.tiny,color:"#aaa",marginBottom:4}}>{label}</div>
              <div style={{fontSize:13,fontWeight:800,color}}>{val!=null?Math.abs(val).toLocaleString():"월탭확인"}<span style={{fontSize:9}}>원</span></div>
            </div>
          ))}
        </div>}
      </Card>

      {/* 소비 요약 */}
      <Card t={t}>
        <SectionLabel t={t}>💰 {periodLabel} 소비 요약</SectionLabel>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[{label:"총 지출",value:weekTotal,color:"#f0735a"},{label:"무지출일",value:zeroDays,color:"#3d9e7b",unit:"일"},{label:"저축/투자",value:weekSavings,color:"#5b6af7"}].map(({label,value,color,unit})=>(
            <div key={label} style={{background:t.inputBg,borderRadius:14,padding:"12px 8px",textAlign:"center"}}>
              <div style={{...S.tiny,color:"#aaa",marginBottom:5}}>{label}</div>
              <div style={{fontSize:15,fontWeight:800,color}}>{value.toLocaleString()}<span style={{fontSize:11}}>{unit||"원"}</span></div>
            </div>
          ))}
        </div>
        <SectionLabel t={t} noMargin>일별 지출</SectionLabel>
        <div style={{display:"flex",gap:period==="month"?3:8,marginTop:12,alignItems:"flex-end",overflowX:"auto",paddingBottom:4}}>
          {spendPerDay.map((v,i)=><MiniBar key={i} value={v} max={maxSpend} color={dates[i]===todayIso?t.accent:"#c7d2fe"} label={dayLabels[i]} sub={v>0?(v>=10000?`${Math.round(v/1000)}k`:`${v}`):""}  isToday={dates[i]===todayIso}/>)}
        </div>
      </Card>

      {/* 카테고리 */}
      <Card t={t}>
        <SectionLabel t={t}>📂 카테고리별 지출</SectionLabel>
        {weekTotal>0&&(()=>{
          const filled=catTotals.filter(c=>c.v>0),total=filled.reduce((s,c)=>s+c.v,0);
          let cumPct=0;const r=54,cx=70,cy=70,sw=28,circ=2*Math.PI*r;
          const segs=filled.map(c=>{const pct=c.v/total,offset=circ*(1-cumPct),dash=circ*pct;cumPct+=pct;return{...c,pct,dash,offset,color:t.statBars[catTotals.findIndex(x=>x.k===c.k)%t.statBars.length]};});
          return <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
            <svg width={140} height={140} style={{flexShrink:0}}>
              <g transform="rotate(-90,70,70)">{segs.map((seg,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth={sw} strokeDasharray={`${seg.dash} ${circ-seg.dash}`} strokeDashoffset={-seg.offset+circ}/>)}</g>
              <text x={cx} y={cy-6} textAnchor="middle" style={{fontSize:11,fontWeight:700,fill:"#999"}}>총 지출</text>
              <text x={cx} y={cy+10} textAnchor="middle" style={{fontSize:13,fontWeight:900,fill:"#333"}}>{total>=10000?`${Math.round(total/10000)}만`:total.toLocaleString()}</text>
              <text x={cx} y={cy+24} textAnchor="middle" style={{fontSize:10,fill:"#aaa"}}>원</text>
            </svg>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
              {segs.map((seg,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:10,height:10,borderRadius:3,background:seg.color,flexShrink:0}}/><span style={{...S.small,color:"#555",flex:1}}>{seg.emoji}{seg.k}</span><span style={{fontSize:11,fontWeight:700,color:seg.color}}>{Math.round(seg.pct*100)}%</span></div>)}
            </div>
          </div>;
        })()}
        {catTotals.map(({k,emoji,v},i)=>v>0&&<BarRow key={k} label={`${emoji} ${k}`} value={v} max={maxCat} color={t.statBars[i%t.statBars.length]} right={`${v.toLocaleString()}원`}/>)}
      </Card>

      {/* 소비 성격 태그 통계 */}
      {Object.keys(tagTotals).length>0&&(
        <Card t={t}>
          <SectionLabel t={t}>🏷️ 소비 성격별 통계</SectionLabel>
          {SPEND_TAGS.filter(tag=>tagTotals[tag]).map(tag=>(
            <BarRow key={tag} label={tag} value={tagTotals[tag]} max={Math.max(...Object.values(tagTotals),1)} color={TAG_COLOR[tag]||t.accent} right={`${tagTotals[tag].toLocaleString()}원`}/>
          ))}
        </Card>
      )}

      {/* 루틴 */}
      <Card t={t}>
        <SectionLabel t={t}>🧭 {periodLabel} 루틴 달성률</SectionLabel>
        <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:18}}>
          <div style={{position:"relative",width:88,height:88,flexShrink:0}}>
            <svg viewBox="0 0 88 88" style={{transform:"rotate(-90deg)",width:88,height:88}}>
              <circle cx="44" cy="44" r="36" fill="none" stroke={t.accentLight} strokeWidth="11"/>
              <circle cx="44" cy="44" r="36" fill="none" stroke={t.accent} strokeWidth="11" strokeDasharray={`${2*Math.PI*36}`} strokeDashoffset={`${2*Math.PI*36*(1-overallPct/100)}`} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.6s ease"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:20,fontWeight:900,color:t.accent}}>{overallPct}%</span></div>
          </div>
          <div><div style={{...S.h3,color:"#333",marginBottom:4}}>{totalDone} / {totalPossible} 완료</div><div style={{...S.small,color:"#aaa"}}>{periodLabel} {dates.length}일 기준</div></div>
        </div>
        <SectionLabel t={t} noMargin>일별 달성</SectionLabel>
        <div style={{display:"flex",gap:period==="month"?3:8,marginTop:12,alignItems:"flex-end",overflowX:"auto",paddingBottom:4}}>
          {routinePerDay.map(({done,total},i)=><MiniBar key={i} value={done} max={ROUTINE_KEYS.length} color={dates[i]===todayIso?t.accent:t.accentLight} label={dayLabels[i]} sub={`${done}/${total}`} isToday={dates[i]===todayIso}/>)}
        </div>
      </Card>

      <Card t={t}>
        <SectionLabel t={t}>✅ 항목별 달성</SectionLabel>
        {ROUTINE_KEYS.map((key,i)=>{const cnt=allData.filter(({routine})=>routine[key]).length;return <BarRow key={key} label={`${ROUTINE_EMOJI[i]} ${key}`} value={cnt} max={dates.length} color={t.statBars[i%t.statBars.length]} right={`${cnt}/${dates.length}일`}/>;} )}
      </Card>

      {/* 몸무게 */}
      {(()=>{
        const wh=[...new Set(Object.keys(localStorage).filter(k=>k.startsWith("dt_diet_")).map(k=>k.replace("dt_diet_","")))].sort().reduce((acc,wIso)=>{const diet=lsGet("diet",wIso,defDiet);if(diet.몸무게&&parseFloat(diet.몸무게)>0)acc.push({iso:wIso,w:parseFloat(diet.몸무게)});return acc;},[]).slice(-12);
        if(!wh.length)return null;
        const wMn=Math.min(...wh.map(x=>x.w)),wMx=Math.max(...wh.map(x=>x.w)),wRange=wMx-wMn||0.1,lastW=wh[wh.length-1].w,firstW=wh[0].w,diff=wh.length>1?(lastW-firstW).toFixed(1):null;
        return <Card t={t}>
          <SectionLabel t={t}>⚖️ 몸무게 변화</SectionLabel>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{background:t.accentLight,borderRadius:14,padding:"12px 16px",textAlign:"center"}}><div style={{...S.tiny,color:t.accent,marginBottom:4}}>최근 기록</div><div style={{fontSize:24,fontWeight:900,color:t.accent}}>{lastW}<span style={{fontSize:12,fontWeight:500}}>kg</span></div></div>
            {diff!==null&&<div style={{background:parseFloat(diff)<0?"#f0faf6":"#fff5f5",borderRadius:14,padding:"12px 16px",textAlign:"center"}}><div style={{...S.tiny,color:"#aaa",marginBottom:4}}>{wh.length}회 기준</div><div style={{fontSize:18,fontWeight:900,color:parseFloat(diff)<0?"#3d9e7b":parseFloat(diff)>0?"#f0735a":"#aaa"}}>{parseFloat(diff)>0?"+":""}{diff}kg</div><div style={{fontSize:10,color:"#aaa",marginTop:2}}>{parseFloat(diff)<0?"😊 감소":parseFloat(diff)>0?"📈 증가":"➡️ 유지"}</div></div>}
          </div>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
            {wh.map(({iso:wIso,w},i)=>{const pct=(w-wMn)/wRange,barH=14+pct*60,isLast=i===wh.length-1;return <div key={wIso} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:8,fontWeight:800,color:isLast?t.accent:"#ccc"}}>{w}</span><div style={{width:"100%",height:barH,background:isLast?t.accent:t.accentLight,borderRadius:"4px 4px 0 0"}}/></div>;})}
          </div>
        </Card>;
      })()}

      <button onClick={copyText} style={{background:t.accent,color:"#fff",border:"none",borderRadius:16,padding:"15px",...S.h3,cursor:"pointer",fontFamily:"inherit",fontWeight:700,boxShadow:`0 4px 14px ${t.accent}55`}}>📋 텍스트로 복사하기</button>
      <div style={{height:20}}/>
    </div>
  );
}

// ── History Detail ────────────────────────────────────────────────────────────
function HistoryDetail({iso, onBack, tab, setTab, todayIso}) {
  const t=THEMES[Math.min(tab,2)];
  const [ledger,setLedger]=useStorage("ledger",iso,defLedger);
  const [routine,setRoutine]=useStorage("routine",iso,defRoutine);
  const [diet,setDiet]=useStorage("diet",iso,defDiet);

  const handleSave=(key,data)=>{ lsSave(key,iso,data); setSavedMsg(true); setTimeout(()=>setSavedMsg(false),1800); };

  return (
    <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:t.contentBg}}>

          <button onClick={onBack} style={{background:"rgba(255,255,255,0.22)",border:"none",borderRadius:20,padding:"6px 14px",color:"#fff",...S.small,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>← 뒤로</button>
          <span style={{...S.small,color:t.titleColor,fontWeight:700,flex:1}}>{isoToLabel(iso)}</span>
          {savedMsg&&<span style={{...S.tiny,color:t.saveTxt,fontSize:10}}>✓ 저장됨</span>}
          <span style={{background:"rgba(255,255,255,0.2)",borderRadius:12,padding:"3px 10px",...S.tiny,color:"rgba(255,255,255,0.9)",fontSize:10}}>✏️ 수정 가능</span>
        </div>
        <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.15)",marginTop:4}}>
          {DETAIL_TABS.map((name,i)=>(
            <button key={name} onClick={()=>setTab(i)}
              style={{flex:1,padding:"11px 4px",background:tab===i?t.tabActiveBg:"transparent",border:"none",fontFamily:"inherit",...S.small,cursor:"pointer",whiteSpace:"nowrap",color:tab===i?t.tabActiveTxt:t.tabInactive,borderRadius:tab===i?"10px 10px 0 0":"0",fontWeight:tab===i?700:500}}>
              {name}
            </button>
          ))}
        </div>
      </div>
      {tab===0&&<LedgerTab  data={ledger}  onChange={setLedger}  t={t} readOnly={false} iso={iso} onSaveHistory={()=>handleSave("ledger",ledger)}/>}
      {tab===1&&<RoutineTab data={routine} onChange={setRoutine} t={t} readOnly={false} iso={iso} onSaveHistory={()=>handleSave("routine",routine)}/>}
      {tab===2&&<DietTab    data={diet}    onChange={setDiet}    t={t} readOnly={false} iso={iso} onSaveHistory={()=>handleSave("diet",diet)}/>}
    </div>
  );
}

// ── Calendar Modal ────────────────────────────────────────────────────────────
const CSS=`
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Pretendard:wght@400;500;600;700;800;900&display=swap');
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:#e8e8e8;-webkit-font-smoothing:antialiased;}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
  textarea,input,button{font-family:inherit;}
  ::-webkit-scrollbar{width:0;}
`;
    
    function CalendarModal({onClose,onSelect,t,todayIso}) {
  const [viewYear,setViewYear]=useState(()=>parseInt(todayIso.slice(0,4)));
  const [viewMonth,setViewMonth]=useState(()=>parseInt(todayIso.slice(5,7)));
  const prevMonth=()=>{ if(viewMonth===1){setViewYear(y=>y-1);setViewMonth(12);}else setViewMonth(m=>m-1); };
  const nextMonth=()=>{ if(`${viewYear}-${p2(viewMonth)}`>=todayIso.slice(0,7))return; if(viewMonth===12){setViewYear(y=>y+1);setViewMonth(1);}else setViewMonth(m=>m+1); };
  const daysInMonth=new Date(viewYear,viewMonth,0).getDate(), firstDow=new Date(viewYear,viewMonth-1,1).getDay();
  const cells=[]; for(let i=0;i<firstDow;i++)cells.push(null); for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const monthStr=`${viewYear}-${p2(viewMonth)}`;

  const dayInfo=useMemo(()=>{
    const m={};
    for(let d=1;d<=daysInMonth;d++){
      const iso=`${monthStr}-${p2(d)}`;
      if(iso>todayIso)continue;
      // 오늘은 데이터 없어도 항상 접근 가능
      const r=lsGet("routine",iso,defRoutine),l=lsGet("ledger",iso,defLedger);
      const done=ROUTINE_KEYS.filter(k=>r[k]).length;
      const spend=SPEND_CATS.reduce((s,k)=>s+(parseInt(l[k])||0),0)+((l.txns||[]).filter(tx=>tx.type==="지출").reduce((s,tx)=>s+tx.amount,0));
      m[d]={has:true,perfect:done===ROUTINE_KEYS.length,done,spend};
    }
    return m;
  },[monthStr,daysInMonth,todayIso]);

  const maxSpend=Math.max(...Object.values(dayInfo).map(v=>v.spend||0),1);
  const spendColor=spend=>{
    if(!spend)return null;
    const ratio=Math.min(spend/maxSpend,1);
    if(ratio<0.5){const r=Math.round(134+(251-134)*ratio*2),g=Math.round(239+(146-239)*ratio*2),b=Math.round(172+(60-172)*ratio*2);return `rgb(${r},${g},${b})`;}
    const r2=(ratio-0.5)*2,r=Math.round(251+(240-251)*r2),g=Math.round(146+(115-146)*r2),b=Math.round(60+(90-60)*r2);return `rgb(${r},${g},${b})`;
  };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",zIndex:100}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"24px 24px 0 0",width:"100%",maxHeight:"80vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 -4px 30px rgba(0,0,0,0.18)"}}>
        <div style={{padding:"20px 20px 14px",borderBottom:`1.5px solid ${t.cardBorder}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{...S.h2,color:t.labelColor}}>📅 기록 달력</span>
            <button onClick={onClose} style={{background:t.inputBg,border:"none",width:32,height:32,borderRadius:"50%",cursor:"pointer",...S.body,color:"#666",fontWeight:700}}>✕</button>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <button onClick={prevMonth} style={{width:36,height:36,borderRadius:"50%",border:`1.5px solid ${t.cardBorder}`,background:"#fff",cursor:"pointer",fontSize:16,color:t.labelColor,fontWeight:700}}>‹</button>
            <span style={{...S.h3,color:"#333"}}>{viewYear}년 {viewMonth}월</span>
            <button onClick={nextMonth} style={{width:36,height:36,borderRadius:"50%",border:`1.5px solid ${t.cardBorder}`,background:"#fff",cursor:"pointer",fontSize:16,color:t.labelColor,fontWeight:700,opacity:`${viewYear}-${p2(viewMonth)}`>=todayIso.slice(0,7)?0.25:1}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginTop:14,textAlign:"center"}}>
            {["일","월","화","수","목","금","토"].map((d,i)=><div key={d} style={{...S.tiny,fontSize:10,color:i===0?"#f0735a":i===6?"#5b6af7":"#aaa",paddingBottom:6}}>{d}</div>)}
          </div>
        </div>
        <div style={{overflowY:"auto",padding:"12px 16px 40px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"6px 4px"}}>
            {cells.map((d,idx)=>{
              if(!d)return <div key={`e${idx}`}/>;
              const info=dayInfo[d],isToday=`${monthStr}-${p2(d)}`===todayIso,isFuture=`${monthStr}-${p2(d)}`>todayIso,dow=(firstDow+d-1)%7,iso=`${monthStr}-${p2(d)}`,sColor=info?.spend?spendColor(info.spend):null;
              return <button key={d} onClick={()=>{if(info&&!isFuture){onSelect(iso);onClose();}}}
                style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"6px 2px 5px",borderRadius:12,border:"none",cursor:info&&!isFuture?"pointer":"default",background:isToday?t.accent:"transparent",transition:"all 0.15s",opacity:isFuture?0.2:1,minHeight:54,position:"relative",overflow:"hidden"}}>
                {sColor&&!isToday&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${Math.max(20,(info.spend/maxSpend)*100)}%`,background:sColor,opacity:0.18,borderRadius:12}}/>}
                <span style={{fontSize:13,fontWeight:isToday||info?700:400,color:isToday?"#fff":dow===0?"#f0735a":dow===6?"#5b6af7":info?"#222":"#ddd",lineHeight:1,position:"relative"}}>{d}</span>
                <div style={{display:"flex",gap:2,marginTop:3,alignItems:"center",position:"relative"}}>
                  {info?.perfect?<span style={{fontSize:9}}>🔥</span>:info?.has?<div style={{width:5,height:5,borderRadius:"50%",background:info.done===ROUTINE_KEYS.length?t.accent:info.done>0?"#facc15":"#e0e0e0"}}/>:null}
                </div>
                {info?.spend>0&&<div style={{fontSize:8,color:isToday?"rgba(255,255,255,0.85)":sColor||"#bbb",fontWeight:700,marginTop:2,position:"relative",lineHeight:1}}>{info.spend>=10000?`${Math.round(info.spend/1000)}k`:`${info.spend}`}</div>}
              </button>;
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const getLocalDate=()=>{ const d=new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; };
  const [iso,setIso]=useState(()=>getLocalDate());
  useEffect(()=>{ const id=setInterval(()=>{ const today=getLocalDate(); setIso(prev=>prev!==today?today:prev); },60000); return ()=>clearInterval(id); },[]);

  const [tab,setTab]=useState(0);
  const [historyTab,setHistoryTab]=useState(0);
  const [showHist,setShowHist]=useState(false);
  const [viewDate,setViewDate]=useState(null);
  const [saved,setSaved]=useState(false);

  const themeIdx=tab===3?0:tab;
  const t=THEMES[themeIdx];
  const d=new Date(iso+"T00:00:00");
  const label=`${d.getFullYear()}.${p2(d.getMonth()+1)}.${p2(d.getDate())} ${DAYS[d.getDay()]}요일`;

  const [ledger,setLedger]=useStorage("ledger",iso,defLedger);
  const [routine,setRoutine]=useStorage("routine",iso,defRoutine);
  const [diet,setDiet]=useStorage("diet",iso,defDiet);
  const ws=s=>v=>{ s(v); setSaved(true); setTimeout(()=>setSaved(false),1400); };

  if(viewDate) return <><style>{CSS}</style><HistoryDetail iso={viewDate} onBack={()=>setViewDate(null)} tab={historyTab} setTab={setHistoryTab} todayIso={iso}/></>;

  return (
    <><style>{CSS}</style>
    <div key={iso} style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:t.contentBg,transition:"background 0.3s"}}>
      <div style={{background:t.headerBg,padding:"20px 20px 0",position:"sticky",top:0,zIndex:10,transition:"background 0.3s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
          <div>
            <div style={{...S.h1,color:t.titleColor,fontFamily:"'Gowun Dodum',serif"}}>하루기록 ✦</div>
            <div style={{...S.small,color:t.dateColor,marginTop:2}}>{label}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",paddingTop:4}}>
            <span style={{...S.tiny,color:t.saveTxt,opacity:saved?1:0,transition:"opacity 0.3s"}}>✓ 저장됨</span>
            <button onClick={()=>setShowHist(true)} style={{border:`1.5px solid ${t.histBorder}`,color:t.histTxt,padding:"6px 13px",borderRadius:20,...S.tiny,cursor:"pointer",background:"rgba(255,255,255,0.15)",fontFamily:"inherit"}}>📅 기록</button>
          </div>
        </div>
        <div style={{display:"flex",gap:4,marginTop:14}}>
          {MAIN_TABS.map((name,i)=>(
            <button key={name} onClick={()=>setTab(i)}
              style={{flex:1,padding:"9px 2px",border:"none",fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",borderRadius:"12px 12px 0 0",transition:"all 0.22s",background:tab===i?t.tabActiveBg:"rgba(255,255,255,0.12)",color:tab===i?t.tabActiveTxt:t.tabInactive}}>
              {name}
            </button>
          ))}
        </div>
      </div>
      {tab===0&&<LedgerTab  data={ledger}  onChange={ws(setLedger)}  t={t} iso={iso}/>}
      {tab===1&&<RoutineTab data={routine} onChange={ws(setRoutine)} t={t} iso={iso}/>}
      {tab===2&&<DietTab    data={diet}    onChange={ws(setDiet)}    t={t} iso={iso}/>}
      {tab===3&&<StatsView  todayIso={iso}/>}
      {showHist&&<CalendarModal t={t} todayIso={iso} onClose={()=>setShowHist(false)} onSelect={d=>{setViewDate(d);setHistoryTab(Math.min(tab,2));}}/>}
    </div></>
  );
}



const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
