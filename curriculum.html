<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="미드저니 30일">
<title>AI 시네마틱 감성사진 커리큘럼</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#f7f7f7;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:3rem}

/* HERO */
.hero{background:linear-gradient(135deg,#FF6B35 0%,#ff8c5a 100%);color:#fff;padding:2.2rem 1.25rem 1.6rem;border-radius:0 0 24px 24px}
.hero-tag{font-size:11px;font-weight:700;letter-spacing:.12em;opacity:.85;margin-bottom:.5rem;text-transform:uppercase}
.hero h1{font-size:27px;font-weight:700;line-height:1.2;margin-bottom:.5rem}
.hero h1 span{opacity:.82}
.hero p{font-size:13px;opacity:.78;line-height:1.5;margin-bottom:1rem}
.prow{display:flex;align-items:center;gap:10px}
.pbar{flex:1;height:7px;background:rgba(255,255,255,.28);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:#fff;border-radius:99px;transition:width .6s}
.plbl{font-size:12px;font-weight:700;white-space:nowrap;opacity:.92}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#efefef;margin:.75rem 1rem 0;border-radius:14px;overflow:hidden}
.si{background:#fff;padding:.8rem .5rem;text-align:center}
.sn{display:block;font-size:22px;font-weight:700;color:#FF6B35}
.sl{display:block;font-size:11px;color:#aaa;margin-top:2px}

/* PHASE HEADER */
.phase-hdr{font-size:11px;font-weight:700;letter-spacing:.09em;color:#FF6B35;text-transform:uppercase;padding:.9rem 1.25rem .45rem;display:flex;align-items:center;gap:8px}
.phase-hdr::after{content:'';flex:1;height:1px;background:#f0f0f0}

/* DAY GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 1rem}

/* DAY CARD */
.dc{background:#fff;border:1.5px solid #efefef;border-radius:12px;padding:.75rem .65rem .7rem;cursor:pointer;position:relative;transition:border-color .15s,transform .1s;user-select:none}
.dc:active{transform:scale(.96)}
.dc.done{border-color:#ffd9c8;background:#fffaf8}
.dc.today{border-color:#FF6B35;background:#fff8f5;box-shadow:0 2px 12px rgba(255,107,53,.13)}
.dc.locked{background:#fafafa;cursor:default}
.sbadge{position:absolute;top:7px;right:7px;width:17px;height:17px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
.sbadge.done{background:#FF6B35;color:#fff}
.sbadge.today{background:#fff;border:1.5px solid #FF6B35;color:#FF6B35;font-size:10px}
.sbadge.locked{background:#e8e8e8;color:#bbb;font-size:10px}
.dnum{font-size:10px;color:#ccc;font-weight:600;margin-bottom:3px;letter-spacing:.03em}
.dc.done .dnum{color:#ffb89a}
.dc.today .dnum{color:#FF6B35}
.dtitle{font-size:12px;font-weight:700;color:#222;line-height:1.25;margin-bottom:4px}
.dtag{font-size:10px;color:#bbb;line-height:1.35}
.dc.locked .dtitle{color:#ccc}
.dc.locked .dtag{color:#ddd}

/* REWARD CARD */
.reward-card{grid-column:1/-1;background:linear-gradient(90deg,#fff8f3,#fff);border:1.5px solid #ffdcc8;border-radius:12px;padding:.8rem 1rem;display:flex;align-items:center;gap:10px;cursor:pointer}
.reward-card:active{transform:scale(.98)}
.reward-icon{font-size:26px;flex-shrink:0}
.reward-title{font-size:13px;font-weight:700;color:#FF6B35}
.reward-sub{font-size:11px;color:#bbb;margin-top:2px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:0 0 2.5rem;transform:translateY(48px);transition:transform .22s}
.modal-bg.open .modal{transform:translateY(0)}
.modal-handle{width:38px;height:4px;background:#e0e0e0;border-radius:99px;margin:10px auto 0}
.modal-header{padding:1rem 1.25rem .8rem;border-bottom:1px solid #f5f5f5}
.modal-day-tag{font-size:11px;font-weight:700;color:#FF6B35;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.modal-title{font-size:21px;font-weight:700;color:#111;line-height:1.2}
.modal-phase{font-size:12px;color:#bbb;margin-top:3px}
.modal-body{padding:1rem 1.25rem}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:14px}
.sp-done{background:#fff0e8;color:#FF6B35}
.sp-today{background:#FF6B35;color:#fff}
.sp-locked{background:#f0f0f0;color:#999}
.modal-section{margin-bottom:1.3rem}
.modal-section-title{font-size:11px;font-weight:700;color:#bbb;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem}
.goals-list{display:flex;flex-direction:column;gap:7px}
.goal-card{background:#fff8f5;border:1px solid #ffdcc8;border-radius:10px;padding:.7rem .95rem;display:flex;gap:.65rem;align-items:flex-start}
.goal-num{width:21px;height:21px;background:#FF6B35;color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.goal-text{font-size:13px;color:#444;line-height:1.5}
.prompt-box{background:#f8f8f8;border-radius:9px;padding:.65rem .9rem;font-size:12px;color:#555;font-family:monospace;line-height:1.6;margin-bottom:6px;border-left:3px solid #FF6B35;word-break:break-all}
.tip-item{display:flex;gap:.6rem;align-items:flex-start;font-size:13px;color:#555;line-height:1.5;padding:.35rem 0}
.tip-dot{color:#FF6B35;flex-shrink:0;font-weight:700}
.ask-btn{width:100%;background:#fff8f5;border:1.5px solid #ffdcc8;color:#FF6B35;padding:.8rem;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;display:block;margin-top:.5rem}
.close-btn{display:block;width:calc(100% - 2.5rem);margin:1rem 1.25rem 0;background:#FF6B35;color:#fff;border:none;padding:.9rem;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center}
</style>
</head>
<body>
<div class="wrap" id="app">

<div class="hero">
  <div class="hero-tag">🎬 Midjourney Master</div>
  <h1>AI 시네마틱<br><span>감성사진</span> 커리큘럼</h1>
  <p>단순 AI 생성이 아닌 — 영화 장면 설계, 감정 연출, 나만의 시그니처 스타일 구축</p>
  <div class="prow">
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <span class="plbl" id="prog-lbl">0 / 30 완료</span>
  </div>
</div>

<div class="stats">
  <div class="si"><span class="sn">30</span><span class="sl">Total Days</span></div>
  <div class="si"><span class="sn" id="stat-done">0</span><span class="sl">Completed</span></div>
  <div class="si"><span class="sn" id="stat-remain">30</span><span class="sl">Remaining</span></div>
</div>

<div id="curriculum-root"></div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeBgClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header" id="mHeader"></div>
    <div class="modal-body" id="mBody"></div>
    <button class="close-btn" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
const CURRICULUM = [
  {
    phase:'Phase 1 — 기초 시스템 (Day 1–7)',
    days:[
      {id:1,title:'기초 시스템',tag:'U/V/Remix · 업스케일',
       goals:['미드저니 U·V 버튼의 역할과 차이를 정확히 이해한다','Remix 모드를 켜고 기존 이미지를 원하는 방향으로 변형해본다','업스케일 단계별 화질 차이(Subtle·Creative)를 직접 비교한다'],
       prompts:['a cinematic street at night, soft neon glow, 8k --v 6.1 --ar 16:9','--style raw 옵션으로 같은 프롬프트 재생성해서 차이 비교','Vary (Subtle) vs Vary (Strong) 결과 비교 실습'],
       tips:['U = 업스케일(확대·디테일), V = 변형(variation 생성)','처음엔 짧은 프롬프트로 시작하고 키워드를 하나씩 추가해가며 변화 확인']},

      {id:2,title:'거리감',tag:'클로즈업 · 미디엄 · 와이드',
       goals:['클로즈업·미디엄샷·와이드샷 각각의 감정적 차이를 이해한다','같은 피사체를 3가지 거리감으로 생성해 나란히 비교해본다','거리감 선택이 스토리텔링에 미치는 영향을 체감한다'],
       prompts:['extreme close up of a woman\'s eye, cinematic, moody','medium shot, person walking in heavy rain, film still','wide shot, empty city street at dawn, lonely atmosphere'],
       tips:['클로즈업 = 감정·감각·디테일 집중','와이드샷 = 공간감·고독감·서사적 분위기 표현']},

      {id:3,title:'렌즈',tag:'24mm – 85mm',
       goals:['24mm·35mm·50mm·85mm 렌즈별 화각 특성을 익힌다','광각과 망원이 공간과 인물에 미치는 차이를 실습한다','인물 촬영에 가장 적합한 렌즈가 무엇인지 직접 확인한다'],
       prompts:['shot on 24mm lens, wide cinematic landscape, dramatic sky','shot on 50mm lens, street scene, natural perspective','shot on 85mm lens, portrait, shallow depth of field, soft bokeh'],
       tips:['24mm = 왜곡·역동성·공간감 극대화','85mm = 자연스러운 인물 표현, 배경 분리 효과 탁월']},

      {id:4,title:'조명',tag:'Blue Hour · Golden Hour · Neon',
       goals:['Blue Hour·Golden Hour·Rainy Night Neon 조명 특성을 이해한다','조명 방향(역광·측광·정면광)에 따른 분위기 차이를 실습한다','드라마틱한 조명으로 감정을 증폭시키는 법을 익힌다'],
       prompts:['blue hour lighting, city reflections on wet pavement, cinematic','golden hour backlit portrait, warm soft glow, film grain','rainy night, neon signs reflected in puddles, moody noir'],
       tips:['Blue Hour(해 뜨기·지기 직전 20분) = 차분·몽환·우울 분위기','Golden Hour = 따뜻·로맨틱·영화적, 역광일수록 극적 효과 증가']},

      {id:5,title:'감정 무드',tag:'Lonely · Melancholic · Tension',
       goals:['감정 키워드가 이미지 전체 분위기에 미치는 영향을 이해한다','Lonely·Melancholic·Quiet Tension 각각을 같은 장면으로 실습한다','감정 키워드 3개 조합으로 복합적 분위기를 만드는 법을 익힌다'],
       prompts:['a woman sitting alone by the window, lonely, cinematic, 35mm','quiet tension, two strangers not speaking, film still, moody','bittersweet nostalgia, old empty classroom, soft light, film grain'],
       tips:['감정 키워드는 프롬프트 앞쪽에 배치할수록 영향력이 커진다','추상적 감정 키워드 2~3개 + 구체적 장면 묘사 조합이 가장 효과적']},

      {id:6,title:'구도',tag:'Rule of Thirds · Leading Lines',
       goals:['Rule of Thirds·Leading Lines·Symmetry 구도 법칙을 이해한다','각 구도 원칙을 실제 프롬프트에 명시해서 적용해본다','시선을 자연스럽게 유도하는 구도 설계 방법을 익힌다'],
       prompts:['rule of thirds composition, subject on left third, negative space right','leading lines, train tracks to horizon, vanishing point, cinematic','perfect symmetry, long corridor, dim light, architectural photograph'],
       tips:['구도를 프롬프트에 명시하면 AI가 의도한 방향으로 훨씬 잘 생성','Leading Lines에는 철로·도로·계단·강·복도가 가장 효과적']},

      {id:7,title:'색감 팔레트',tag:'Warm · Muted · Cool · Desaturated',
       goals:['Warm·Muted·Cool·Desaturated 색감의 차이와 감정적 효과를 이해한다','같은 장면을 4가지 색 팔레트로 생성해 비교해본다','나에게 맞는 시그니처 색감 방향성을 탐색하기 시작한다'],
       prompts:['warm color palette, amber and golden tones, cinematic film look','muted desaturated colors, melancholic, 35mm film grain, soft','cool blue tones, night city, desaturated, cyberpunk inspired'],
       tips:['Muted = 세련되고 감성적, Warm = 따뜻하고 로맨틱, Cool = 도시적·긴장감','색감 키워드 하나만 추가해도 전체 분위기가 완전히 달라진다']},

      {id:'b1',badge:true,icon:'🏅',title:'카메라 마스터 뱃지',sub:'Phase 1 완료 — 7가지 핵심 기술 완성',
       goals:['미드저니 기본 조작을 완전히 숙지했다','거리감·렌즈·구도를 자유롭게 지정해 원하는 장면을 만들 수 있다','조명과 색감으로 감정적 분위기를 설계하기 시작했다'],
       prompts:[],
       tips:['Phase 1의 7가지 기술을 복합 사용할 준비가 됐어요!','이제 장면 연출 단계로 넘어갈 차례입니다']},
    ]
  },
  {
    phase:'Phase 2 — 장면 연출 (Day 8–15)',
    days:[
      {id:8,title:'시간대 연출',tag:'Golden · Blue · Midnight · Noon',
       goals:['Golden Hour·Blue Hour·Midnight·Noon 시간대별 조명 특성을 완전히 이해한다','시간대 키워드만으로 드라마틱한 분위기 전환을 실습한다','나만의 선호 시간대를 찾고 집중적으로 연습한다'],
       prompts:['golden hour, warm backlight, cinematic portrait, lens flare, 35mm','midnight, empty street, single street lamp, noir atmosphere','blue hour, city skyline reflection in river, melancholic, wide shot'],
       tips:['Midnight + neon reflection = 도시 누아르 느낌','Golden Hour + backlight + lens flare = 영화 포스터급 결과물']},

      {id:9,title:'날씨 효과',tag:'Fog · Snow · Rain · Storm',
       goals:['Fog·Snow·Rain·Storm 날씨가 주는 감정적 차이를 이해한다','날씨와 조명·시간대를 함께 조합하는 방법을 익힌다','날씨 효과로 이야기를 만드는 복합 프롬프트 연습을 한다'],
       prompts:['heavy fog, forest path at dawn, mysterious atmosphere, backlight','snow falling gently, city at night, warm window light, cinematic','heavy rain, neon reflections on wet pavement, noir, 24mm'],
       tips:['Fog = 신비·공포·고독, Rain = 감성·드라마·도시 누아르','날씨 + 시간대 조합이 장면의 감정을 2배로 증폭시킨다']},

      {id:10,title:'피사체 배치',tag:'Silhouette · Reflection · Shadow',
       goals:['Silhouette·Reflection·Shadow 배치 기법의 효과를 이해한다','전경·중경·후경 레이어 구성으로 깊이감을 만드는 법을 익힌다','피사체와 배경의 관계로 이야기를 만드는 연습을 한다'],
       prompts:['silhouette of a person against orange sunset, minimalist, powerful','reflection in puddle, upside-down cityscape, surreal, cinematic','strong dramatic shadow on textured wall, abstract, high contrast'],
       tips:['실루엣 = 감정에 집중, 디테일 제거로 보는 사람이 상상하게 유도','반사(Reflection) = 같은 장면을 두 배로 활용, 초현실적 효과']},

      {id:11,title:'텍스처 & 재질',tag:'Metal · Glass · Fabric · Stone',
       goals:['Metal·Glass·Fabric·Stone·Wood 재질 키워드의 표현 차이를 이해한다','재질 키워드가 전체 이미지 분위기에 미치는 영향을 실습한다','질감과 조명을 조합해 촉각적 느낌까지 전달하는 이미지를 만든다'],
       prompts:['wet metal surface, rain drops, macro shot, high detail, cinematic','frosted glass texture, soft light through, minimalist, elegant','worn fabric, close up texture, golden hour light, warm film look'],
       tips:['재질 키워드는 조명과 조합할 때 효과가 극대화된다','Wet metal + neon = 사이버펑크, Worn fabric + warm light = 복고 감성']},

      {id:12,title:'배경 디테일',tag:'Bokeh · Depth · Blur',
       goals:['Bokeh·Depth of Field·Background Blur의 차이와 활용법을 이해한다','배경 디테일의 강약 조절로 피사체를 부각시키는 법을 익힌다','배경 정보의 양으로 이야기의 맥락을 조절하는 연습을 한다'],
       prompts:['shallow depth of field, person in foreground, bokeh background, 85mm','deep focus, sharp foreground and background, environmental portrait','creamy bokeh, city lights at night, defocused, portrait mode'],
       tips:['Bokeh = 배경 흐림으로 피사체 집중·분리 효과','Deep focus = 배경까지 선명하게 = 환경과 인물의 관계 강조']},

      {id:13,title:'인물 표현',tag:'Portrait · Expression · Gesture',
       goals:['표정·시선·제스처 키워드가 인물 이미지에 미치는 영향을 이해한다','감정 상태를 표정 없이 제스처와 구도만으로 표현하는 법을 익힌다','시선 방향(카메라 응시 vs 외면)에 따른 심리적 효과를 체험한다'],
       prompts:['close up portrait, woman looking away, melancholic expression, film','person from behind, walking alone, rainy street, cinematic, 35mm','hands holding a cup of coffee, morning light, intimate, warm tones'],
       tips:['얼굴을 보여주지 않아도 강한 감정 전달 가능 (뒷모습·손·발)','시선이 카메라 밖을 향할수록 더 영화적·서사적 분위기 형성']},

// Flatten all days for completion tracking
const allDays = [];
CURRICULUM.forEach(p => p.days.forEach(d => { if(!d.badge) allDays.push(d.id); }));
const TOTAL = allDays.length; // 30

// Load completion state
function getCompleted() {
  try { return JSON.parse(localStorage.getItem('mj_done')||'[]'); } catch(e){ return []; }
}
function saveCompleted(arr) {
  try { localStorage.setItem('mj_done', JSON.stringify(arr)); } catch(e){}
}

// Build UI
function getStatus(id, completed) {
  if(completed.includes(id)) return 'done';
  const idx = allDays.indexOf(id);
  if(idx === 0) return 'today';
  const prevDone = idx > 0 && completed.includes(allDays[idx-1]);
  if(prevDone) return 'today';
  return 'locked';
}

function render() {
  const completed = getCompleted();
  const doneCount = completed.length;

  // Header stats
  document.getElementById('pfill').style.width = (doneCount/TOTAL*100)+'%';
  document.getElementById('prog-lbl').textContent = doneCount+' / '+TOTAL+' 완료';
  document.getElementById('stat-done').textContent = doneCount;
  document.getElementById('stat-remain').textContent = TOTAL - doneCount;

  let html = '';
  CURRICULUM.forEach(phase => {
    html += `<div class="phase-hdr">${phase.phase}</div><div class="grid">`;
    phase.days.forEach(d => {
      if(d.badge) {
        const allPrevDone = phase.days.filter(x=>!x.badge).every(x=>completed.includes(x.id));
        html += `<div class="reward-card" onclick="openModal('${d.id}')">
          <span class="reward-icon">${d.icon}</span>
          <div><div class="reward-title">${d.title}</div><div class="reward-sub">${d.sub}</div></div>
        </div>`;
      } else {
        const st = getStatus(d.id, completed);
        html += `<div class="dc ${st}" onclick="openModal(${d.id})">
          <div class="sbadge ${st}">${st==='done'?'✓':st==='today'?'→':'🔒'}</div>
          <div class="dnum">Day ${String(d.id).padStart(2,'0')}</div>
          <div class="dtitle">${d.title}</div>
          <div class="dtag">${d.tag}</div>
        </div>`;
      }
    });
    html += '</div>';
  });
  document.getElementById('curriculum-root').innerHTML = html;
}

function openModal(id) {
  const numId = typeof id === 'number' ? id : id;
  // find day
  let day = null;
  CURRICULUM.forEach(p => p.days.forEach(d => { if(String(d.id)===String(numId)) day=d; }));
  if(!day) return;

  const completed = getCompleted();
  const isBadge = !!day.badge;
  const st = isBadge ? (completed.length > 0 ? 'done' : 'locked') : getStatus(day.id, completed);
  const stLabel = {done:'✓ 완료',today:'→ 오늘 학습',locked:'🔒 잠금 해제 전'}[st]||'';
  const stClass = {done:'sp-done',today:'sp-today',locked:'sp-locked'}[st]||'sp-locked';

  document.getElementById('mHeader').innerHTML =
    `<div class="modal-day-tag">${isBadge?'🏅 BADGE':'Day '+String(day.id).padStart(2,'0')}</div>
     <div class="modal-title">${day.title}</div>
     <div class="modal-phase">${day.tag||''}</div>`;

  let body = `<span class="status-pill ${stClass}">${stLabel}</span>`;

  // Goals
  if(day.goals&&day.goals.length) {
    body += `<div class="modal-section"><div class="modal-section-title">학습 목표</div><div class="goals-list">`;
    day.goals.forEach((g,i)=>{
      body+=`<div class="goal-card"><div class="goal-num">${i+1}</div><div class="goal-text">${g}</div></div>`;
    });
    body += `</div></div>`;
  }

  // Prompts
  if(day.prompts&&day.prompts.length) {
    body += `<div class="modal-section"><div class="modal-section-title">추천 프롬프트 예시</div>`;
    day.prompts.forEach(p=>{body+=`<div class="prompt-box">${p}</div>`;});
    body += `</div>`;
  }

  // Tips
  if(day.tips&&day.tips.length) {
    body += `<div class="modal-section"><div class="modal-section-title">핵심 팁</div>`;
    day.tips.forEach(t=>{body+=`<div class="tip-item"><span class="tip-dot">✦</span><span>${t}</span></div>`;});
    body += `</div>`;
  }

  // Complete button
  if(!isBadge && (st==='today'||st==='done')) {
    const isDone = completed.includes(day.id);
    body += `<button class="ask-btn" onclick="toggleDone(${day.id})">${isDone?'✓ 완료 취소하기':'✅ 오늘 학습 완료!'}</button>`;
  }

  document.getElementById('mBody').innerHTML = body;
  document.getElementById('modalBg').classList.add('open');
}

function toggleDone(id) {
  const completed = getCompleted();
  const idx = completed.indexOf(id);
  if(idx>-1) completed.splice(idx,1);
  else completed.push(id);
  saveCompleted(completed);
  render();
  openModal(id);
}

function closeBgClick(e) { if(e.target===document.getElementById('modalBg')) closeModal(); }
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

// Init
render();
</script>
</body>
</html>
